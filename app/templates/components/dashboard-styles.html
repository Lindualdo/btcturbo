<!-- Estilos específicos do Dashboard -->
<style>
.config-container {
    display: flex; justify-content: center; align-items: center; gap: 1rem;
    margin-bottom: 2rem; padding: 1rem; background: #161b22; border-radius: 8px;
    max-width: 800px; margin-left: auto; margin-right: auto; flex-wrap: wrap;
}
.config-section { display: flex; align-items: center; gap: 0.5rem; }
.toggle-switch { position: relative; display: inline-block; width: 50px; height: 28px; }
.toggle-switch input { opacity: 0; width: 0; height: 0; }
.slider {
    position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0;
    background-color: #666; transition: .4s; border-radius: 28px;
}
.slider:before {
    position: absolute; content: ""; height: 22px; width: 22px; left: 3px; bottom: 3px;
    background-color: white; transition: .4s; border-radius: 50%;
}
input:checked + .slider { background-color: #f7931a; }
input:checked + .slider:before { transform: translateX(22px); }
.toggle-label { color: #fff; font-weight: 600; font-size: clamp(12px, 2vw, 14px); }
.btn-update {
    background: #f7931a; color: #000; border: none; border-radius: 6px;
    padding: 8px 16px; cursor: pointer; font-weight: 600; font-size: 12px;
    transition: all 0.3s ease;
}
.btn-update:hover { background: #e8851a; transform: translateY(-1px); }
.btn-update:disabled { background: #666; cursor: not-allowed; transform: none; }
</style>
